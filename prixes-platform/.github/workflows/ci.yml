name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: prixes
          POSTGRES_PASSWORD: prixes
          POSTGRES_DB: prixes_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U prixes" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql+asyncpg://prixes:prixes@localhost:5432/prixes_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run alembic upgrade head
      - run: uv run pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  # Verifies the native pipeline: static export → Capacitor sync → Android build.
  # iOS release builds require a macOS runner + signing secrets (see apps/web/MOBILE.md)
  # and are done from Xcode on the Mac, so they are not part of this CI.
  mobile-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: npm install
      - run: npm run build:mobile
      - run: npx cap sync android
      - name: Assemble Android debug APK
        working-directory: apps/web/android
        run: ./gradlew assembleDebug --no-daemon
